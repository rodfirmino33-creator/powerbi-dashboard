<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Central Power BI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:
    radial-gradient(circle at top left,#ffb30030 0%,transparent 30%),
    radial-gradient(circle at bottom right,#ffb30025 0%,transparent 30%),
    #000;
    color:white;
    min-height:100vh;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:14px 12px;
    overflow:hidden;
}

.container{
    width:100%;
    max-width:620px;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.header{
    text-align:center;
    margin-bottom:16px;
    flex-shrink:0;
}

.logo{
    width:58px;
    margin-bottom:8px;
}

.title{
    font-size:3rem;
    font-weight:800;
    color:#ffc400;
    line-height:1;
    text-shadow:0 0 25px rgba(255,196,0,.4);
}

.subtitle{
    font-size:1rem;
    color:#e5e5e5;
    margin-top:6px;
}

.update{
    margin-top:6px;
    color:#bdbdbd;
    font-size:.76rem;
}

.cards{
    display:flex;
    flex-direction:column;
    gap:11px;
    flex-shrink:0;
}

.card{
    display:flex;
    align-items:center;
    justify-content:space-between;

    background:linear-gradient(
    145deg,
    rgba(30,30,30,.95),
    rgba(0,0,0,.98));

    border:2px solid #ffc400;

    border-radius:20px;

    padding:13px 22px;

    text-decoration:none;

    color:white;

    transition:.3s ease;

    box-shadow:
    0 0 15px rgba(255,196,0,.15),
    0 0 40px rgba(255,196,0,.08);
}

.card:hover{
    transform:translateY(-3px) scale(1.01);

    box-shadow:
    0 0 20px rgba(255,196,0,.35),
    0 0 50px rgba(255,196,0,.25);
}

.left{
    display:flex;
    align-items:center;
    gap:16px;
}

.icon{
    width:50px;
    min-width:50px;

    height:50px;

    border-radius:50%;

    border:2px solid #ffc400;

    display:flex;
    align-items:center;
    justify-content:center;

    color:#ffc400;

    font-size:1.35rem;

    font-weight:700;
}

.divider{
    width:1px;
    height:42px;
    background:#ffc400;
}

.name{
    font-size:1.35rem;
    font-weight:700;
}

.arrow{
    color:#ffc400;
    font-size:2.2rem;
    transition:.3s;
}

.card:hover .arrow{
    transform:translateX(6px);
}

.footer{
    margin-top:14px;
    text-align:center;
    color:#8f8f8f;
    font-size:.72rem;
    flex-shrink:0;
}

@media(max-width:768px){

    body{
        padding:12px 10px;
    }

    .container{
        max-width:100%;
    }

    .header{
        margin-bottom:14px;
    }

    .logo{
        width:52px;
        margin-bottom:7px;
    }

    .title{
        font-size:2.55rem;
    }

    .subtitle{
        font-size:.88rem;
        margin-top:5px;
    }

    .update{
        font-size:.68rem;
        margin-top:5px;
    }

    .cards{
        gap:10px;
    }

    .card{
        padding:12px 16px;
        border-radius:18px;
    }

    .left{
        gap:14px;
    }

    .name{
        font-size:1.08rem;
    }

    .icon{
        width:45px;
        height:45px;
        min-width:45px;
        font-size:1.15rem;
    }

    .divider{
        height:36px;
    }

    .arrow{
        font-size:1.9rem;
    }

    .footer{
        margin-top:12px;
        font-size:.68rem;
    }
}

@media(max-width:480px){

    .title{
        font-size:2.25rem;
    }

    .subtitle{
        font-size:.78rem;
    }

    .update{
        font-size:.62rem;
    }

    .cards{
        gap:9px;
    }

    .card{
        padding:11px 14px;
        border-radius:16px;
    }

    .left{
        gap:11px;
    }

    .icon{
        width:40px;
        height:40px;
        min-width:40px;
        font-size:1rem;
    }

    .divider{
        display:none;
    }

    .name{
        font-size:.98rem;
    }

    .arrow{
        font-size:1.6rem;
    }

    .footer{
        margin-top:10px;
        font-size:.62rem;
    }
}

@media(max-width:380px){

    body{
        padding:8px;
    }

    .header{
        margin-bottom:10px;
    }

    .logo{
        width:44px;
        margin-bottom:5px;
    }

    .title{
        font-size:1.95rem;
    }

    .subtitle{
        font-size:.7rem;
    }

    .update{
        font-size:.56rem;
    }

    .cards{
        gap:7px;
    }

    .card{
        padding:9px 12px;
        border-radius:14px;
    }

    .left{
        gap:9px;
    }

    .icon{
        width:36px;
        height:36px;
        min-width:36px;
        font-size:.9rem;
    }

    .name{
        font-size:.86rem;
    }

    .arrow{
        font-size:1.4rem;
    }

    .footer{
        margin-top:8px;
        font-size:.56rem;
    }
}

</style>
</head>

<body>

<div class="container">

        <a class="card"

        <a class="card"

    </div>

    <div class="footer">

</div>

<script>

const agora = new Date();

document.getElementById("datetime").innerHTML =

</script>

</body>
</html>
