<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Central Power BI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:
    radial-gradient(circle at top left,#ffb30030 0%,transparent 30%),
    radial-gradient(circle at bottom right,#ffb30025 0%,transparent 30%),
    #000;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px 15px;
}

.container{
    width:100%;
    max-width:700px;
}

.header{
    text-align:center;
    margin-bottom:35px;
}

.logo{
    width:90px;
    margin-bottom:15px;
}

.title{
    font-size:4rem;
    font-weight:800;
    color:#ffc400;
    line-height:1;
    text-shadow:0 0 25px rgba(255,196,0,.4);
}

.subtitle{
    font-size:1.2rem;
    color:#e5e5e5;
    margin-top:10px;
}

.update{
    margin-top:12px;
    color:#bdbdbd;
    font-size:.95rem;
}

.cards{
    display:flex;
    flex-direction:column;
    gap:22px;
}

.card{
    display:flex;
    align-items:center;
    justify-content:space-between;

    background:linear-gradient(
    145deg,
    rgba(30,30,30,.95),
    rgba(0,0,0,.98));

    border:2px solid #ffc400;

    border-radius:28px;

    padding:24px 30px;

    text-decoration:none;

    color:white;

    transition:.3s ease;

    box-shadow:
    0 0 15px rgba(255,196,0,.15),
    0 0 40px rgba(255,196,0,.08);
}

.card:hover{
    transform:translateY(-4px) scale(1.02);

    box-shadow:
    0 0 20px rgba(255,196,0,.35),
    0 0 50px rgba(255,196,0,.25);
}

.left{
    display:flex;
    align-items:center;
    gap:25px;
}

.icon{
    width:70px;
    min-width:70px;

    height:70px;

    border-radius:50%;

    border:3px solid #ffc400;

    display:flex;
    align-items:center;
    justify-content:center;

    color:#ffc400;

    font-size:2rem;

    font-weight:700;
}

.divider{
    width:1px;
    height:60px;
    background:#ffc400;
}

.name{
    font-size:2rem;
    font-weight:700;
}

.arrow{
    color:#ffc400;
    font-size:3rem;
    transition:.3s;
}

.card:hover .arrow{
    transform:translateX(8px);
}

.footer{
    margin-top:35px;
    text-align:center;
    color:#8f8f8f;
    font-size:.85rem;
}

@media(max-width:768px){

    .title{
        font-size:3rem;
    }

    .name{
        font-size:1.4rem;
    }

    .icon{
        width:60px;
        height:60px;
        min-width:60px;
        font-size:1.6rem;
    }

    .card{
        padding:20px;
    }

    .arrow{
        font-size:2.2rem;
    }
}

@media(max-width:480px){

    .name{
        font-size:1.15rem;
    }

    .left{
        gap:15px;
    }

    .divider{
        display:none;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="header">

        <img
        class="logo"
        src="https://upload.wikimedia.org/wikipedia/commons/c/cf/New_Power_BI_Logo.svg"
        alt="Power BI">

        <div class="title">POWER BI</div>

        <div class="subtitle">
            Atualizações realizadas diariamente
        </div>

        <div class="update">
            Última atualização:
            <span id="datetime"></span>
        </div>

    </div>

    <div class="cards">

        <a class="card"
        href="https://app.powerbi.com/view?r=eyJrIjoiNGJhMTAyZDEtMTQ1OC00YjAwLWIyOTQtZDA1NTRhYzY3ZGRjIiwidCI6IjA1MTlkYzJmLWEzNDUtNGIxMS1iNDMwLTc3NDBkZjExNDkzNCJ9"
        target="_blank">

            <div class="left">
                <div class="icon">🏆</div>
                <div class="divider"></div>
                <div class="name">Prêmios ao Vivo</div>
            </div>

            <div class="arrow">›</div>

        </a>

        <a class="card"
        href="https://app.powerbi.com/view?r=eyJrIjoiNGI0NDUzNDMtYmQ3Zi00OTkxLTlmZWItNDdjNWIyMDNkMDNlIiwidCI6IjA1MTlkYzJmLWEzNDUtNGIxMS1iNDMwLTc3NDBkZjExNDkzNCJ9"
        target="_blank">

            <div class="left">
                <div class="icon">B</div>
                <div class="divider"></div>
                <div class="name">Mega Bingo</div>
            </div>

            <div class="arrow">›</div>

        </a>

        <a class="card"
        href="https://app.powerbi.com/view?r=eyJrIjoiM2M2Mzk3NTYtZjM5NS00Y2ExLThjNmQtOWE0MTIzOTJmYzg2IiwidCI6IjA1MTlkYzJmLWEzNDUtNGIxMS1iNDMwLTc3NDBkZjExNDkzNCJ9"
        target="_blank">

            <div class="left">
                <div class="icon">₿</div>
                <div class="divider"></div>
                <div class="name">Pix Keno</div>
            </div>

            <div class="arrow">›</div>

        </a>

        <a class="card"
        href="https://app.powerbi.com/view?r=eyJrIjoiYzlmZTQ5ZDEtZjg2ZC00M2VlLTg2YjYtODRkZGVlYTdkMTJiIiwidCI6IjA1MTlkYzJmLWEzNDUtNGIxMS1iNDMwLTc3NDBkZjExNDkzNCJ9"
        target="_blank">

            <div class="left">
                <div class="icon">A</div>
                <div class="divider"></div>
                <div class="name">Apache Melissa</div>
            </div>

            <div class="arrow">›</div>

        </a>

        <a class="card"
        href="https://app.powerbi.com/view?r=eyJrIjoiZGY3ZGQ3YzUtM2E4YS00YzZhLWFmYjItMjllNzM4NGUyMzM5IiwidCI6IjA1MTlkYzJmLWEzNDUtNGIxMS1iNDMwLTc3NDBkZjExNDkzNCJ9"
        target="_blank">

            <div class="left">
                <div class="icon">A</div>
                <div class="divider"></div>
                <div class="name">Apache Aline</div>
            </div>

            <div class="arrow">›</div>

        </a>

    </div>

    <div class="footer">
        Central de Dashboards
    </div>

</div>

<script>

const agora = new Date();

document.getElementById("datetime").innerHTML =
agora.toLocaleDateString("pt-BR") +
" às " +
agora.toLocaleTimeString("pt-BR");

</script>

</body>
</html>
